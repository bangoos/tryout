<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate, proxy-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<title>TKA ISMUBA 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
/* Style tetap sama seperti sebelumnya */
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{background: linear-gradient(135deg,#020617,#0f172a,#1e3a8a);color:white;min-height:100vh}
.container{max-width:1000px;margin:auto;padding:20px}
.header{text-align:center;margin-top:30px}
.header h1{font-size:2.8rem;background: linear-gradient(90deg,#facc15,#f59e0b);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header p{margin-top:10px;opacity:0.8}
.timer{margin-top:20px;font-size:1.2rem;background:rgba(255,255,255,0.1);display:inline-block;padding:10px 20px;border-radius:10px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:40px}
.card{background:rgba(255,255,255,0.05);backdrop-filter: blur(12px);border-radius:20px;padding:25px;transition:0.3s;border:1px solid rgba(255,255,255,0.1)}
.card:hover{transform:translateY(-10px) scale(1.02);box-shadow:0 20px 40px rgba(0,0,0,0.5)}
.card h2{color:#facc15;margin-bottom:10px}
.btn{margin-top:20px;display:inline-block;padding:12px 25px;border-radius:30px;background:linear-gradient(90deg,#facc15,#f59e0b);color:black;font-weight:bold;text-decoration:none;transition:0.3s}
.btn:hover{transform:scale(1.1);box-shadow:0 10px 25px rgba(250,204,21,0.6)}
.btn.disabled{background:gray;color:#ccc;pointer-events:none;box-shadow:none}
.footer{text-align:center;margin-top:60px;padding:30px;background:rgba(255,255,255,0.05);border-radius:20px}
.footer p{margin:10px 0;opacity:0.9}
.status{margin-top:10px;font-size:0.9rem;opacity:0.8}
@media(max-width:768px){.grid{grid-template-columns:1fr}}
</style>
</head>

<body>

<div class="container">
    <div class="header">
        <h1>Pelaksanaan TKA ISMUBA 2026</h1>
        <p>Waktu Ujian: <b>06.00 - 21.00 WIB</b></p>
        <div class="timer" id="timer"></div>
    </div>

    <div class="grid">
        <div class="card">
            <h2>Hari Pertama</h2>
            <p><b>Senin, 30 Maret 2026</b></p>
            <a id="btn1" href="https://www.bookwidgets.com/play/1l_rw9Xs-iQAErw65kQAAA/RHWUKRM/ismuba-2026?teacher_id=4857117912596480" class="btn exam-link">Mulai Ujian</a>
            <div class="status" id="status1"></div>
        </div>

        <div class="card">
            <h2>Hari Kedua</h2>
            <p><b>Selasa, 31 Maret 2026</b></p>
            <a id="btn2" href="https://www.bookwidgets.com/play/1l_rw9Xs-iQAErw65kQAAA/RHWUKRM/ismuba-2026?teacher_id=4857117912596480" class="btn exam-link">Mulai Ujian</a>
            <div class="status" id="status2"></div>
        </div>
    </div>

    <div class="footer">
        <h3>✨ Motivasi ✨</h3>
        <p>"Kerjakan dengan jujur dan percaya diri."</p>
        <p><b>Panitia TKA ISMUBA 2026</b></p>
    </div>
</div>

<script>
function updateTime(){
    const now = new Date();
    document.getElementById("timer").innerHTML = "Waktu Sekarang: " + now.toLocaleString('id-ID');
    checkAccess(now);
}

function checkAccess(now){
    const hour = now.getHours();
    const day = now.getDate();
    const month = now.getMonth(); 
    const year = now.getFullYear();

    const day1 = (day === 30 && month === 2 && year === 2026);
    const day2 = (day === 31 && month === 2 && year === 2026);
    const withinTime = (hour >= 6 && hour < 21);

    const btn1 = document.getElementById("btn1");
    const btn2 = document.getElementById("btn2");
    
    if(day1 && withinTime) { btn1.classList.remove("disabled"); document.getElementById("status1").innerHTML = "🟢 Ujian Aktif"; }
    else { btn1.classList.add("disabled"); document.getElementById("status1").innerHTML = "🔴 Tertutup"; }

    if(day2 && withinTime) { btn2.classList.remove("disabled"); document.getElementById("status2").innerHTML = "🟢 Ujian Aktif"; }
    else { btn2.classList.add("disabled"); document.getElementById("status2").innerHTML = "🔴 Tertutup"; }
}

// LOGIKA PEMBERSIH CACHE & SESI UNTUK EDGE
document.querySelectorAll('.exam-link').forEach(link => {
    link.addEventListener('click', function(e) {
        e.preventDefault();
        
        // 1. Tambahkan Unique ID (Timestamp) agar Edge menganggap ini request baru
        const timestamp = new Date().getTime();
        let finalUrl = this.href;
        
        // Tambahkan parameter anti-cache
        finalUrl += (finalUrl.includes('?') ? '&' : '?') + 'refresh=' + timestamp;
        
        // 2. Clear Session Storage browser (jika ada data nyangkut di domain yang sama)
        try {
            sessionStorage.clear();
            localStorage.clear(); // Hati-hati: ini menghapus data lokal jika domainnya sama
        } catch (e) {}

        // 3. Arahkan ke URL baru di tab yang sama
        window.location.replace(finalUrl);
    });
});

setInterval(updateTime, 1000);
updateTime();
</script>

</body>
</html>
